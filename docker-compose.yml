version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: etera_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-etera_health}
      MYSQL_USER: ${DB_USER:-etera_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-etera_password}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'false'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-etera_user}", "-p${DB_PASSWORD:-etera_password}"]
      timeout: 20s
      retries: 10
    networks:
      - etera_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etera_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-etera_user}
      DB_PASSWORD: ${DB_PASSWORD:-etera_password}
      DB_NAME: ${DB_NAME:-etera_health}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      JWT_EXPIRY: ${JWT_EXPIRE:-7d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_PASS: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@etera.health}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - etera_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etera_frontend
    restart: unless-stopped
    environment:
      API_BASE: ${FRONTEND_API_BASE:-http://localhost:5000}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - etera_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    driver: local

networks:
  etera_network:
    driver: bridge
